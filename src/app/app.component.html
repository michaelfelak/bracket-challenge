<!-- Toolbar -->
<div class="toolbar" role="banner">
  <!-- Platform App Switcher (Desktop Only) -->
  <app-platform-switcher class="desktop-platform-switcher"></app-platform-switcher>

  <!-- Platform App Switcher (Mobile) -->
  <div class="mobile-app-switcher">
    <button
      class="app-switcher-btn"
      [class.open]="appSwitcherOpen"
      (click)="toggleAppSwitcher()"
      aria-label="Switch application"
    >
      <span class="dropdown-arrow-mobile-hidden">▼</span>
      <span class="app-icon">🏀</span>
      <span class="app-name-mobile-hidden">Bracket Challenge</span>
    </button>

    <div class="app-menu" [class.open]="appSwitcherOpen" *ngIf="appSwitcherOpen">
      <a href="/bowl-pickem" class="app-option" (click)="closeAppSwitcher()">
        <span class="app-icon">🏈</span>
        <span class="app-name">Bowl Pick'em</span>
      </a>
      <div class="divider"></div>
      <a href="/bracket-challenge" class="app-option active" (click)="closeAppSwitcher()">
        <span class="app-icon">🏀</span>
        <span class="app-name">Bracket Challenge</span>
      </a>
    </div>
    
    <div class="menu-backdrop" *ngIf="appSwitcherOpen" (click)="closeAppSwitcher()"></div>
  </div>

  <!-- Desktop Navigation -->
  <nav class="nav-menu">
    <a routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
    <a *ngIf="isAuthenticated" routerLink="my-profile" routerLinkActive="active" (click)="closeMenu()">My Profile</a>
    <a *ngIf="entriesLocked" routerLink="picks" routerLinkActive="active" (click)="closeMenu()">Submit Entry</a>
    <a routerLink="standings" routerLinkActive="active" (click)="closeMenu()">Standings</a>
    <a routerLink="scores" routerLinkActive="active" (click)="closeMenu()">Bracket</a>
    <a routerLink="scenario" routerLinkActive="active" (click)="closeMenu()">Simulator</a>
    <a routerLink="winners" routerLinkActive="active" (click)="closeMenu()">Points</a>
    <a *ngIf="isAuthenticated" routerLink="feedback" routerLinkActive="active" (click)="closeMenu()">Feedback</a>
    <a routerLink="about" routerLinkActive="active" (click)="closeMenu()">About</a>
    <a *ngIf="isAdmin" routerLink="admin" routerLinkActive="active" (click)="closeMenu()">Admin</a>
  </nav>

  <!-- Mobile Navigation (Right Menu) -->
  <button
    class="hamburger"
    [class.open]="menuOpen"
    (click)="toggleMenu()"
    aria-label="Toggle menu"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="mobile-menu" [class.open]="menuOpen">
    <a routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
    <a *ngIf="isAuthenticated" routerLink="my-profile" routerLinkActive="active" (click)="closeMenu()">My Profile</a>
    <a *ngIf="entriesLocked" routerLink="picks" routerLinkActive="active" (click)="closeMenu()">Submit Entry</a>
    <a routerLink="standings" routerLinkActive="active" (click)="closeMenu()">Standings</a>
    <a routerLink="scores" routerLinkActive="active" (click)="closeMenu()">Bracket</a>
    <a routerLink="scenario" routerLinkActive="active" (click)="closeMenu()">Simulator</a>
    <a routerLink="winners" routerLinkActive="active" (click)="closeMenu()">Points</a>
    <a *ngIf="isAuthenticated" routerLink="feedback" routerLinkActive="active" (click)="closeMenu()">Feedback</a>
    <a routerLink="about" routerLinkActive="active" (click)="closeMenu()">About</a>
    <a *ngIf="isAdmin" routerLink="admin" routerLinkActive="active" (click)="closeMenu()">Admin</a>
  </nav>

  <!-- Auth Section -->
  <div class="spacer"></div>
  <div class="auth-section">
    <ng-container *ngIf="isAuthenticated; else notLoggedIn">
      <!-- User Avatar Dropdown -->
      <div class="user-avatar-container">
        <button
          class="user-avatar"
          (click)="toggleUserDropdown()"
          [title]="'User menu for ' + (currentUser$ | async)"
          aria-label="User menu"
        >
          {{ (currentUser$ | async)?.[0]?.toUpperCase() }}
        </button>

        <!-- Dropdown Menu -->
        <div class="user-dropdown" *ngIf="showUserDropdown">
          <div class="dropdown-username">
            {{ currentUser$ | async }}
            <span *ngIf="isAdmin" class="admin-badge">Admin</span>
          </div>
          <button class="dropdown-item" (click)="navigateToMyProfile()">
            My Profile
          </button>
          <button class="dropdown-item logout-item" (click)="logout()">
            Logout
          </button>
        </div>
      </div>
    </ng-container>
    <ng-template #notLoggedIn>
      <button (click)="login()">Login</button>
    </ng-template>
  </div>
</div>

<router-outlet></router-outlet>
