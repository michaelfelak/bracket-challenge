<main *ngIf="isAuthenticated">
  <h1 class="header">My Profile</h1>

  <!-- Error Alert -->
  <div *ngIf="showError" class="error-alert">
    {{ errorMsg }}
  </div>

  <!-- Profile Details Section -->
  <div class="profile-details-section">
    <div class="profile-details-content">
      <div class="detail-item">
        <span class="detail-label">Username</span>
        <span class="detail-value">{{ username }}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Email</span>
        <span class="detail-value">{{ email }}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Total Entries</span>
        <span class="detail-value">{{ totalEntries }}</span>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="entries.length === 0 && !isLoading" class="empty-state">
    <p>No entries found. <a routerLink="/picks" style="color: #0066cc; text-decoration: underline; font-weight: 600;">Create one now!</a></p>
  </div>

  <!-- Entries Table -->
  <div *ngIf="entries.length > 0" class="entries-container">
    <h2 class="entries-header">My Entries</h2>
    <table class="entries-table">
      <thead>
        <tr>
          <th>Entry Name</th>
          <th>Email</th>
          <th>Submitted Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let entry of entries">
          <td class="entry-name">{{ entry.name }}</td>
          <td class="entry-email">{{ entry.email }}</td>
          <td class="entry-date">{{ formatDate(entry.created_date) }}</td>
          <td class="entry-status">
            <span *ngIf="entry.is_paid" class="status-badge paid">
              ✓ Paid
            </span>
            <span *ngIf="!entry.is_paid" class="status-badge unpaid">
              Unpaid
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
