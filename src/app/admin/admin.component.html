<main>
  <div class="admin-header">
    <h1>Admin Dashboard</h1>
    <div class="bracket-selector">
      <label for="bracket-select">Select Bracket:</label>
      <select id="bracket-select" [(ngModel)]="selectedBracketIdLocal" (change)="onBracketSelect()">
        <option *ngFor="let bracket of brackets" [ngValue]="bracket.id">
          {{ bracket.year }}
        </option>
      </select>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="tab-navigation">
    <button 
      *ngFor="let tab of tabs" 
      [class.active]="activeTab === tab.id"
      [class.dragging]="draggedTabId === tab.id"
      (click)="selectTab(tab.id)"
      (dragstart)="onTabDragStart($event, tab.id)"
      (dragover)="onTabDragOver($event)"
      (drop)="onTabDrop($event, tab.id)"
      (dragend)="onTabDragEnd()"
      class="tab-button"
      type="button"
      draggable="true"
      [attr.title]="'Drag to reorder. Currently at position ' + (tabs.indexOf(tab) + 1)"
    >
      {{ tab.label }}
    </button>
  </div>

  <!-- Tab Content -->
  <div class="tab-content">
    <!-- Settings Tab -->
    <div *ngIf="activeTab === 'settings'" class="tab-pane active">
      <h2>System Settings</h2>
      <div class="settings-grid">
        <div class="setting-item">
          <label>Flyout Enabled</label>
          <div class="setting-value">
            <span class="status" [class.enabled]="settings?.flyout_enabled">
              {{ settings?.flyout_enabled ? 'YES' : 'NO' }}
            </span>
          </div>
        </div>
        <div class="setting-item">
          <label>Entry Registration Enabled</label>
          <div class="setting-value">
            <span class="status" [class.enabled]="settings?.entry_enabled">
              {{ settings?.entry_enabled ? 'YES' : 'NO' }}
            </span>
          </div>
        </div>
      </div>
      <div class="settings-grid">
        <div class="setting-item">
          <h3>Add Bracket</h3>
          <app-add-record></app-add-record>
        </div>
      </div>
    </div>

    <!-- Entry Management Tab -->
    <div *ngIf="activeTab === 'entries'" class="tab-pane active">
      <h2>Setup Bracket</h2>
      <div class="entry-section">
        <div class="entry-subsection">
          <h3>Add Teams to Bracket</h3>
          <app-bracket-grid [bracketId]="selectedBracketId"></app-bracket-grid>
        </div>
      </div>
    </div>

    <!-- Paid Status Tab -->
    <div *ngIf="activeTab === 'paid-status'" class="tab-pane active">
      <h2>Update Paid Status</h2>
      <app-paid-status [bracketId]="selectedBracketId"></app-paid-status>
    </div>

    <!-- Select Winners Tab -->
    <div *ngIf="activeTab === 'winners'" class="tab-pane active">
      <h2>Select Bracket Winners</h2>
      <app-select-winners [bracketId]="selectedBracketId"></app-select-winners>
    </div>

    <!-- Blog Tab -->
    <div *ngIf="activeTab === 'blog'" class="tab-pane active">
      <div class="blog-sections">
        <div class="blog-section">
          <h2>Generate Blog Post</h2>
          <app-blog-post-generator [bracketId]="selectedBracketId"></app-blog-post-generator>
        </div>
        <hr style="margin: 50px 0;" />
        <div class="blog-section">
          <h2>Manage Blog Entries</h2>
          <app-add-blog></app-add-blog>
        </div>
      </div>
    </div>

    <!-- User Feedback Tab -->
    <div *ngIf="activeTab === 'feedback'" class="tab-pane active">
      <app-user-feedback
        (unaddressedCountChange)="onUnaddressedFeedbackCountChange($event)"
      ></app-user-feedback>
    </div>
  </div>
</main>
