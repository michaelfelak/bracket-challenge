<div class="bracket-tree-container">
  <!-- Messages -->
  <div *ngIf="successMessage" class="message success">
    {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="message error">
    {{ errorMessage }}
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading">
    <p>Loading bracket...</p>
  </div>

  <!-- Bracket -->
  <div *ngIf="!isLoading && rounds.length > 0" class="bracket">
    <div *ngFor="let round of rounds" class="round">
      <div class="round-header">
        <h3>{{ round.roundName }}</h3>
        <span class="match-count">{{ round.matches.length }} Match<span *ngIf="round.matches.length !== 1">es</span></span>
      </div>

      <div class="matches">
        <div *ngFor="let match of round.matches" class="match">
          <!-- Team 1 -->
          <div class="match-team" [class.winner]="match.winner?.seed_id === match.team1?.seed_id">
            <button
              *ngIf="match.team1"
              class="team-btn"
              [class.is-winner]="match.winner?.seed_id === match.team1?.seed_id"
              (click)="selectWinner(match, match.team1)"
              type="button"
            >
              <span class="seed">{{ match.team1.seed_number }}</span>
              <span class="school">{{ match.team1.school_name }}</span>
              <span *ngIf="match.winner?.seed_id === match.team1?.seed_id" class="winner-badge">✓</span>
            </button>
            <div *ngIf="!match.team1" class="team-placeholder">
              <span class="text">TBD</span>
            </div>
          </div>

          <!-- Match Separator -->
          <div class="match-separator"></div>

          <!-- Team 2 -->
          <div class="match-team" [class.winner]="match.winner?.seed_id === match.team2?.seed_id">
            <button
              *ngIf="match.team2"
              class="team-btn"
              [class.is-winner]="match.winner?.seed_id === match.team2?.seed_id"
              (click)="selectWinner(match, match.team2)"
              type="button"
            >
              <span class="seed">{{ match.team2.seed_number }}</span>
              <span class="school">{{ match.team2.school_name }}</span>
              <span *ngIf="match.winner?.seed_id === match.team2?.seed_id" class="winner-badge">✓</span>
            </button>
            <div *ngIf="!match.team2" class="team-placeholder">
              <span class="text">TBD</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- No Bracket Message -->
  <div *ngIf="!isLoading && rounds.length === 0" class="no-bracket">
    <p>No seeds available. Add seeds from the Entries tab first.</p>
  </div>
</div>
